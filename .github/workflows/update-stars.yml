name: Refresh star counts

# Keeps the ⭐ counts in profile/README.md current with the live GitHub numbers.
# Commits made with GITHUB_TOKEN do not trigger further workflow runs, so this
# never loops.

on:
  schedule:
    - cron: '23 */3 * * *' # every 3 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-stars
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Refresh star counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-stars.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain profile/README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore: refresh star counts"
            git push
          else
            echo "No changes."
          fi
